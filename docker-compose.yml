version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: filing-system
    environment:
      POSTGRES_USER: ${DB_USER:-tommy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-filing_system}
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tommy -d filing_system"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: