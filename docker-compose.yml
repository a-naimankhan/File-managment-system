version: '3.8'

services:
  db:
    image: postgres:18-alpine
    container_name: filing-system
    environment:

      POSTGRES_USER: ${DB_USER:-tommy}

      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123} #anyway local data
      POSTGRES_DB: ${DB_NAME:-filing_system}
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: